# GPU override for OC workers — use with:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d oc-worker oc-worker-2
#
# oc-worker   → GPU 1 (Sentinel primary, avoids Frigate on GPU 0)
# oc-worker-2 → GPU 0 (shares with Frigate — monitor VRAM usage)

services:
  oc-worker:
    build:
      context: ./oc-worker
      dockerfile: Dockerfile.gpu
    networks:
      - sentinel-net
    environment:
      OC_USE_GPU: "true"
      CUDA_VISIBLE_DEVICES: "0"
      OC_MODEL_NAME: yolo11s
    volumes:
      - yolo-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-1}"]
              capabilities: [gpu]

  oc-worker-2:
    build:
      context: ./oc-worker
      dockerfile: Dockerfile.gpu
    container_name: sentinel-oc-worker-2
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - minio
    env_file: .env
    networks:
      - sentinel-net
    environment:
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: minio:9000
      WORKER_TYPE: oc
      OC_USE_GPU: "true"
      CUDA_VISIBLE_DEVICES: "0"
      OC_MODEL_NAME: yolo11s
    volumes:
      - yolo-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

networks:
  sentinel-net:
    external: true
    name: sentinel-pipeline_sentinel-net

volumes:
  yolo-models:
    external: true
    name: sentinel-pipeline_yolo-models
