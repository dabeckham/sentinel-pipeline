server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver with a short TTL so nginx
    # re-resolves container hostnames after restarts (avoids 502s from
    # stale cached IPs when orchestrator container is recreated).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy /api/* to orchestrator
    location /api/ {
        set $upstream http://orchestrator:8000;
        proxy_pass $upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket /ws/*
    location /ws/ {
        set $upstream http://orchestrator:8000;
        proxy_pass $upstream/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # SPA — all other requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
