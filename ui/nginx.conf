server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver with short TTL.
    # When proxy_pass uses a variable, nginx re-resolves the hostname on
    # each request instead of caching at startup — survives container restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy /api/* to orchestrator.
    # proxy_pass with no path + variable → nginx forwards the full request URI
    # unchanged (no prefix stripping, no doubling).
    location /api/ {
        set $upstream orchestrator;
        proxy_pass http://$upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket /ws/*
    location /ws/ {
        set $upstream orchestrator;
        proxy_pass http://$upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # SPA — all other requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
